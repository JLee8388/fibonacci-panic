name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  build-and-test:
    name: Lint, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Unit + integration tests
        run: npm test

      - name: Build web bundle
        run: npm run build

      - name: Verify build output exists
        run: |
          test -f www/assets/app.js
          test -f www/assets/tailwind.css
          test -f www/assets/lucide.min.js
